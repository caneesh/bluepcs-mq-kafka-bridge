# =============================================================================
# PRODUCTION CONFIGURATION TEMPLATE
# =============================================================================
# Copy this file to application-prod.yml and set environment variables.
#
# REQUIRED ENVIRONMENT VARIABLES:
#   MQ_PASSWORD           - IBM MQ password
#   KAFKA_TRUSTSTORE_PASSWORD - Kafka SSL truststore password
#   OAUTH_CLIENT_SECRET   - OAuth2 client secret
#
# RECOMMENDED TO SET VIA ENVIRONMENT:
#   MQ_HOST, MQ_PORT, MQ_QUEUE_MANAGER, MQ_CHANNEL, MQ_QUEUE, MQ_USERNAME
#   KAFKA_BOOTSTRAP_SERVERS, KAFKA_TOPIC, KAFKA_TRUSTSTORE_LOCATION
#   HDFS_NAMENODE, HDFS_BASE_PATH, HDFS_KERBEROS_PRINCIPAL, HDFS_KERBEROS_KEYTAB
#   API_BASE_URL, OAUTH_TOKEN_URL, OAUTH_CLIENT_ID
# =============================================================================

bridge:
  # ---------------------------------------------------------------------------
  # Startup Mode
  # ---------------------------------------------------------------------------
  # Set to true to run validation only (no message consumption)
  validate-only: ${VALIDATE_ONLY:false}

  # ---------------------------------------------------------------------------
  # IBM MQ Configuration
  # ---------------------------------------------------------------------------
  mq:
    host: ${MQ_HOST}
    port: ${MQ_PORT:1414}
    queue-manager: ${MQ_QUEUE_MANAGER}
    channel: ${MQ_CHANNEL}
    queue: ${MQ_QUEUE}
    username: ${MQ_USERNAME}
    password: ${MQ_PASSWORD}
    # IMPORTANT: Set to true to start consuming messages
    listener-enabled: ${MQ_LISTENER_ENABLED:false}
    concurrency: ${MQ_CONCURRENCY:2}
    receive-timeout: 10000
    ssl:
      enabled: ${MQ_SSL_ENABLED:false}
      cipher-suite: ${MQ_SSL_CIPHER_SUITE:}
      truststore-location: ${MQ_SSL_TRUSTSTORE_LOCATION:}
      truststore-password: ${MQ_SSL_TRUSTSTORE_PASSWORD:}

  # ---------------------------------------------------------------------------
  # Kafka Configuration
  # ---------------------------------------------------------------------------
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    topic: ${KAFKA_TOPIC}
    audit-topic: ${KAFKA_AUDIT_TOPIC:bridge-audit}
    security-protocol: ${KAFKA_SECURITY_PROTOCOL:SASL_SSL}
    sasl-mechanism: ${KAFKA_SASL_MECHANISM:GSSAPI}
    sasl-jaas-config: ${KAFKA_SASL_JAAS_CONFIG:}
    jaas-config-path: ${KAFKA_JAAS_CONFIG_PATH:}
    kerberos-service-name: ${KAFKA_KERBEROS_SERVICE_NAME:kafka}
    truststore-location: ${KAFKA_TRUSTSTORE_LOCATION}
    truststore-password: ${KAFKA_TRUSTSTORE_PASSWORD}
    keystore-location: ${KAFKA_KEYSTORE_LOCATION:}
    keystore-password: ${KAFKA_KEYSTORE_PASSWORD:}
    key-password: ${KAFKA_KEY_PASSWORD:}
    request-size: ${KAFKA_REQUEST_SIZE:4194400}
    delivery-timeout-ms: 120000
    request-timeout-ms: 30000
    acks: all
    retries: 5

  # ---------------------------------------------------------------------------
  # HDFS Configuration
  # ---------------------------------------------------------------------------
  hdfs:
    namenode: ${HDFS_NAMENODE}
    base-path: ${HDFS_BASE_PATH}
    archive-path: ${HDFS_ARCHIVE_PATH:}
    replication: ${HDFS_REPLICATION:3}
    temp-suffix: .tmp
    kerberos:
      enabled: ${HDFS_KERBEROS_ENABLED:true}
      principal: ${HDFS_KERBEROS_PRINCIPAL}
      keytab: ${HDFS_KERBEROS_KEYTAB}
      namenode-principal: ${HDFS_NAMENODE_PRINCIPAL:}
      resourcemanager-principal: ${HDFS_RESOURCEMANAGER_PRINCIPAL:}

  # ---------------------------------------------------------------------------
  # Marketing Plan API Configuration
  # ---------------------------------------------------------------------------
  api:
    base-url: ${API_BASE_URL}
    timeout-seconds: ${API_TIMEOUT_SECONDS:30}
    retry-attempts: ${API_RETRY_ATTEMPTS:3}
    retry-delay-ms: ${API_RETRY_DELAY_MS:1000}

  # ---------------------------------------------------------------------------
  # OAuth2 Security Configuration
  # ---------------------------------------------------------------------------
  security:
    token-url: ${OAUTH_TOKEN_URL}
    client-id: ${OAUTH_CLIENT_ID}
    client-secret: ${OAUTH_CLIENT_SECRET}
    scope: ${OAUTH_SCOPE:}

  # ---------------------------------------------------------------------------
  # Audit Configuration
  # ---------------------------------------------------------------------------
  audit:
    enabled: true
    hive-table: ${AUDIT_HIVE_TABLE:bridge_audit}

  # ---------------------------------------------------------------------------
  # Logging Configuration
  # ---------------------------------------------------------------------------
  logging:
    directory: ${LOG_DIRECTORY:/var/log/bridge}

  # ---------------------------------------------------------------------------
  # Recovery Configuration (optional - requires 'hbase' profile)
  # ---------------------------------------------------------------------------
  recovery:
    enabled: false

# =============================================================================
# Spring Configuration
# =============================================================================
spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    producer:
      acks: all
      retries: 5
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        max.request.size: ${KAFKA_REQUEST_SIZE:4194400}
        delivery.timeout.ms: 120000
        request.timeout.ms: 30000
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:SASL_SSL}
      sasl.mechanism: ${KAFKA_SASL_MECHANISM:GSSAPI}
      sasl.kerberos.service.name: ${KAFKA_KERBEROS_SERVICE_NAME:kafka}
      ssl.truststore.location: ${KAFKA_TRUSTSTORE_LOCATION}
      ssl.truststore.password: ${KAFKA_TRUSTSTORE_PASSWORD:}

# =============================================================================
# Hadoop Configuration
# =============================================================================
hadoop:
  conf-dir: ${HADOOP_CONF_DIR:/etc/hadoop/conf}

# =============================================================================
# Logging Configuration
# =============================================================================
logging:
  level:
    com.hcsc.bridge: INFO
    org.apache.kafka: WARN
    org.apache.hadoop: WARN
    com.ibm.mq: WARN
  file:
    name: ${LOG_DIRECTORY:/var/log/bridge}/bridge-application.log

# =============================================================================
# Actuator Configuration
# =============================================================================
management:
  endpoint:
    health:
      show-details: when_authorized
  endpoints:
    web:
      exposure:
        include: health,info,metrics

# =============================================================================
# Server Configuration
# =============================================================================
server:
  port: ${SERVER_PORT:8080}
